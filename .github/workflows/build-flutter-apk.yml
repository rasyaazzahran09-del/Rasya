name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Unique build id
        required: true
        type: string
      zip_path:
        description: Path ZIP in repository
        required: true
        type: string
      apk_name:
        description: Output APK file name
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Prepare workspace
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          BUILD_ID: ${{ github.event.inputs.build_id }}
          APK_NAME: ${{ github.event.inputs.apk_name }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/repo" "$GITHUB_WORKSPACE/build-output/$BUILD_ID" "$GITHUB_WORKSPACE/build-logs"
          git config --global init.defaultBranch "$REF_NAME"
          cd "$GITHUB_WORKSPACE/repo"
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git fetch --depth=1 origin "$REF_NAME"
          git checkout -B "$REF_NAME" FETCH_HEAD
          echo "REPO_DIR=$GITHUB_WORKSPACE/repo" >> "$GITHUB_ENV"
          echo "OUTPUT_DIR=$GITHUB_WORKSPACE/build-output/$BUILD_ID" >> "$GITHUB_ENV"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk curl unzip xz-utils zip git ca-certificates
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> "$GITHUB_PATH"

      - name: Install Flutter stable
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          rm -rf flutter-sdk flutter.tar.xz
          curl -L --retry 5 --retry-delay 5 https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.29.3-stable.tar.xz -o flutter.tar.xz
          mkdir -p flutter-sdk
          tar -xf flutter.tar.xz -C flutter-sdk
          echo "$RUNNER_TEMP/flutter-sdk/flutter/bin" >> "$GITHUB_PATH"

      - name: Validate ZIP path
        shell: bash
        run: |
          set -euo pipefail
          test -f "$REPO_DIR/${{ github.event.inputs.zip_path }}"

      - name: Prepare source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/source-unzip"
          mkdir -p "$RUNNER_TEMP/source-unzip"
          unzip -q "$REPO_DIR/${{ github.event.inputs.zip_path }}" -d "$RUNNER_TEMP/source-unzip" 2>&1 | tee "$GITHUB_WORKSPACE/build-logs/unzip.log"
          if [ -f "$RUNNER_TEMP/source-unzip/pubspec.yaml" ]; then
            echo "PROJECT_DIR=$RUNNER_TEMP/source-unzip" >> "$GITHUB_ENV"
          else
            found=$(find "$RUNNER_TEMP/source-unzip" -maxdepth 6 -type f -name pubspec.yaml | head -n 1 || true)
            if [ -z "$found" ]; then
              echo "pubspec.yaml tidak ditemukan. Pastikan ZIP berisi project Flutter." | tee "$GITHUB_WORKSPACE/build-logs/validation.log"
              exit 1
            fi
            echo "PROJECT_DIR=$(dirname "$found")" >> "$GITHUB_ENV"
          fi

      - name: Flutter doctor
        shell: bash
        run: |
          set -o pipefail
          flutter doctor -v 2>&1 | tee "$GITHUB_WORKSPACE/build-logs/flutter-doctor.log"

      - name: Flutter pub get
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail
          flutter pub get 2>&1 | tee "$GITHUB_WORKSPACE/build-logs/flutter-pub-get.log"

      - name: Build APK
        shell: bash
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          set -o pipefail
          flutter build apk --release 2>&1 | tee "$GITHUB_WORKSPACE/build-logs/flutter-build.log"
          out=$(find build/app/outputs/flutter-apk -maxdepth 1 -type f -name "*.apk" | head -n 1 || true)
          if [ -z "$out" ]; then
            echo "APK output tidak ditemukan" | tee "$GITHUB_WORKSPACE/build-logs/apk-missing.log"
            exit 1
          fi
          cp "$out" "$OUTPUT_DIR/${{ github.event.inputs.apk_name }}"

      - name: Pack logs
        if: always()
        shell: bash
        env:
          BUILD_ID: ${{ github.event.inputs.build_id }}
        run: |
          set +e
          cd "$GITHUB_WORKSPACE"
          zip -r "$OUTPUT_DIR/build-logs-$BUILD_ID.zip" build-logs >/dev/null 2>&1 || true

      - name: Upload outputs to repository
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          BUILD_ID: ${{ github.event.inputs.build_id }}
          APK_NAME: ${{ github.event.inputs.apk_name }}
        run: |
          set +e
          upload_file() {
            local local_path="$1"
            local remote_path="$2"
            local message="$3"
            if [ ! -f "$local_path" ]; then
              echo "Lewati upload karena file tidak ada: $local_path"
              return 0
            fi
            gh api "repos/$REPO/contents/$remote_path"               --method PUT               -f message="$message"               -f branch="$REF_NAME"               -f content="$(base64 -w 0 "$local_path")" >/dev/null
          }
          upload_file "$OUTPUT_DIR/$APK_NAME" "build-output/$BUILD_ID/$APK_NAME" "build: save apk $BUILD_ID"
          upload_file "$OUTPUT_DIR/build-logs-$BUILD_ID.zip" "build-output/$BUILD_ID/build-logs-$BUILD_ID.zip" "build: save logs $BUILD_ID"